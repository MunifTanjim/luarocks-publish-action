name: 'LuaRocks Publish'
description: 'Publish to LuaRocks using GitHub Actions'
author: 'Munif Tanjim'
branding:
  color: 'blue'
  icon: 'moon'
inputs:
  lua_version:
    description: 'Lua version.'
    required: true
  luajit_verison:
    description: 'LuaJIT version.'
    required: false
    default: ''
  luarocks_version:
    description: 'LuaRocks version.'
    required: true
  name:
    description: 'Package name.'
    required: false
    default: ''
  dev_ref:
    description: 'Development reference.'
    required: false
    default: 'main'
runs:
  using: 'composite'
  steps:
    - name: Setup Luver
      uses: MunifTanjim/luver-action@v1
      with:
        default: ${{ inputs.lua_version }}
        lua_versions: ${{ inputs.lua_version }}
        luajit_versions: ${{ inputs.luajit_version && format('{0}:{1}', inputs.lua_version, inputs.luajit_version) || '' }}
        luarocks_versions: ${{ inputs.lua_version }}:${{ inputs.luarocks_version }}
    - name: Make rockspec
      run: ${{ github.action_path }}/scripts/make-rockspec.sh
      shell: bash
      env:
        INPUT_NAME: ${{ inputs.name }}
        INPUT_DEV_REF: ${{ inputs.dev_ref }}
